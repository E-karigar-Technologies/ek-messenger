<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ mode === 'invite' ? 'Invite Members' : 'Add Participants' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar 
    [(ngModel)]="searchText" 
    placeholder="Search by name">
  </ion-searchbar>

  <!-- Loading Spinner -->
  <ion-spinner 
    *ngIf="isLoading" 
    name="dots" 
    style="display: block; margin: auto;">
  </ion-spinner>

  <!-- Invite Link Banner (only in invite mode) -->
  <div *ngIf="mode === 'invite'" class="invite-link-banner">
    <ion-icon name="link-outline" class="link-icon"></ion-icon>
    <div class="link-info">
      <p class="link-title">Community Invite Link</p>
      <p class="link-subtitle">Share this link to invite people</p>
    </div>
    <ion-button fill="clear" (click)="copyInviteLink()">
      <ion-icon name="copy-outline" slot="icon-only"></ion-icon>
    </ion-button>
    <ion-button fill="clear" (click)="shareInviteLink()">
      <ion-icon name="share-social-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </div>

  <!-- Selected chips -->
  <div *ngIf="selectedUsers.length > 0" class="selected-chip-row">
    <ion-chip *ngFor="let user of selectedUsers" (click)="toggleSelect(user)">
      <ion-avatar>
        <img [src]="user.image" />
      </ion-avatar>
      <ion-label>{{ user.name }}</ion-label>
      <ion-icon name="close-circle"></ion-icon>
    </ion-chip>
  </div>

  <!-- User list -->
  <ion-list>
    <ion-item 
      *ngFor="let user of filteredUsers()" 
      (click)="toggleSelect(user)">
      <ion-avatar slot="start">
        <img [src]="user.image" />
      </ion-avatar>
      <ion-label>
        <h2>{{ user.name }}</h2>
      </ion-label>
      <ion-checkbox 
        slot="end" 
        [(ngModel)]="user.selected" 
        (ionChange)="checkboxChanged(user)">
      </ion-checkbox>
    </ion-item>
  </ion-list>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button 
      expand="block" 
      [disabled]="selectedUsers.length === 0" 
      class="add-btn" 
      (click)="onFooterAction()">
      <!-- ★ mode ke hisaab se button text change -->
      {{ mode === 'invite' ? 'Send Invite Link (' + selectedUsers.length + ')' : 'Add (' + selectedUsers.length + ')' }}
    </ion-button>
  </ion-toolbar>
</ion-footer>
