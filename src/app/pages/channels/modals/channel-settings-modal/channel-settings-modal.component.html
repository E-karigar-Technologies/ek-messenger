<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Channel settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Reaction settings section -->
  <p class="section-label">Which reactions can followers send</p>

  <ion-list lines="none" class="radio-list">
    <ion-radio-group [(ngModel)]="reactionMode">

      <ion-item class="radio-item" detail="false">
        <ion-radio slot="start" value="any" color="primary"></ion-radio>
        <ion-label>Any emoji</ion-label>
      </ion-item>

      <ion-item class="radio-item" detail="false">
        <ion-radio slot="start" value="default" color="primary"></ion-radio>
        <ion-label>Default only (👍❤️😂😮😢🙏)</ion-label>
      </ion-item>

      <ion-item class="radio-item" detail="false">
        <ion-radio slot="start" value="none" color="primary"></ion-radio>
        <ion-label>None</ion-label>
      </ion-item>

    </ion-radio-group>
  </ion-list>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button
      expand="block"
      color="primary"
      class="footer-btn"
      [disabled]="isSaving"
      (click)="save()">
      <ion-spinner *ngIf="isSaving" name="dots"></ion-spinner>
      <span *ngIf="!isSaving">Save</span>
    </ion-button>
  </ion-toolbar>
</ion-footer>
