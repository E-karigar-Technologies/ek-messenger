<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Invite via link</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="invite-header">
    <div class="channel-preview">
      <ion-avatar>
<img [src]="channel.channel_dp || 'assets/images/user.jfif'" />
      </ion-avatar>
      <div class="channel-info">
<h3>{{ channel.channel_name }}</h3>
        <p class="link-text">{{ channelLink }}</p>
      </div>
    </div>
    <p class="helper-text">Anyone with Convo can use this link to follow this channel. Only share it with people you trust.</p>
  </div>

  <ion-list lines="none" class="action-list">
    <ion-item button (click)="sendViaApp()">
      <ion-icon slot="start" name="logo-whatsapp" color="success" class="action-icon"></ion-icon>
      <ion-label>Send link via Convo</ion-label>
    </ion-item>
    
    <ion-item button (click)="shareToStatus()">
      <ion-icon slot="start" name="radio-outline" color="primary" class="action-icon"></ion-icon>
      <ion-label>Share to my status</ion-label>
    </ion-item>

    <ion-item button (click)="copyLink()">
      <ion-icon slot="start" name="copy-outline" color="medium" class="action-icon"></ion-icon>
      <ion-label>Copy link</ion-label>
    </ion-item>

    <ion-item button (click)="systemShare()">
      <ion-icon slot="start" name="share-social-outline" color="primary" class="action-icon"></ion-icon>
      <ion-label>Share link...</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
