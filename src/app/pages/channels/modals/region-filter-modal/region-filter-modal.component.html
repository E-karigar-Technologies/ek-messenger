<ion-header>
  <ion-toolbar>
    <ion-title>Filter</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>


  <ion-searchbar [(ngModel)]="search" placeholder="Search regions" class="custom-searchbar"></ion-searchbar>

  <div>
    <ion-list lines="none">
      <ion-item *ngFor="let r of filteredRegions" (click)="selectRegion(r)"
        [class.selected]="selectedRegion?.region_id === r.region_id"
        lines="none">
        <ion-label class="itemLabel">{{ r.region_name }}</ion-label>
        <ion-icon *ngIf="selectedRegion?.region_id === r.region_id" name="checkmark" slot="end"></ion-icon>
      </ion-item>
    </ion-list>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="clearFilters()">Clear</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="apply()">Apply</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
